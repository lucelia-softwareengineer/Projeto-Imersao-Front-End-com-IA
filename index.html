<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <header>
            <button type="button" class="theme-toggle" data-theme-toggle aria-pressed="false" aria-label="Ativar modo claro">
            </button>
            <img class="brand-logo" src="../assets/netflix.png" alt="Netflix">
            <h1>Quem está assistindo?</h1>
        </header>
        <section aria-label="Perfis disponíveis">
            <ul class="profiles">
                <li>
                    <ol aria-label="Perfil 1">
                        <li>
                            <a class="profile" href="catalogo/catalogo.html" aria-label="Selecionar Perfil 1">
                                <figure>
                                    <img src="./assets/perfil-1.jpg"
                                        alt="Imagem que mostra uma mulher sorrindo, vestida como uma princesa da Disney">
                                    <figcaption>Alice</figcaption>
                                </figure>
                            </a>
                        </li>
                    </ol>
                </li>
                <li>
                    <ol aria-label="Perfil 2">
                        <li>
                            <a class="profile" href="catalogo/catalogo.html" aria-label="Selecionar Perfil 2">
                                <figure>
                                    <img src="./assets/perfil-2.jpg"
                                        alt="Imagem que mostra uma mulher sorrindo, vestida como um super-herói">
                                    <figcaption>Haley</figcaption>
                                </figure>
                            </a>
                        </li>
                    </ol>
                </li>
                <li>
                    <ol aria-label="Perfil 3">
                        <li>
                            <a class="profile" href="catalogo/catalogo.html" aria-label="Selecionar Perfil 3">
                                <figure>
                                    <img src="./assets/perfil-3.jpg"
                                        alt="Imagem que mostra um homem sorrindo, vestido com uma camisa azul e um boné azul">
                                    <figcaption>John</figcaption>
                                </figure>
                            </a>
                        </li>
                    </ol>
                </li>
            </ul>
        </section>
    </main>
    <script src="script.js" defer></script>
</body>

</html>
